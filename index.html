<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cube Earth — Irish Field Intelligence</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #ffffff;
    --surface:  #f8fafc;
    --border:   #e2e8f0;
    --green:    #16a34a;
    --green-lt: #dcfce7;
    --amber:    #d97706;
    --amber-lt: #fef3c7;
    --red:      #dc2626;
    --red-lt:   #fee2e2;
    --text:     #0f172a;
    --muted:    #64748b;
    --mono:     'JetBrains Mono', monospace;
    --sans:     'Inter', sans-serif;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── TOP BAR ── */
  .topbar {
    height: 56px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 16px;
    flex-shrink: 0;
    z-index: 1000;
  }

  .logo {
    font-size: 16px;
    font-weight: 700;
    color: var(--green);
    letter-spacing: -0.02em;
    white-space: nowrap;
  }

  .logo span { color: var(--text); }

  .coord-input {
    flex: 1;
    max-width: 280px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 8px 14px;
    border-radius: 8px;
    outline: none;
    transition: border-color 0.15s;
  }

  .coord-input:focus { border-color: var(--green); }

  .btn-scan {
    background: var(--green);
    color: #fff;
    border: none;
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 600;
    padding: 8px 20px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
  }

  .btn-scan:hover { background: #15803d; }
  .btn-scan:disabled { background: #86efac; cursor: not-allowed; }

  .tagline {
    font-size: 12px;
    color: var(--muted);
    margin-left: auto;
    white-space: nowrap;
  }

  /* ── MAIN AREA ── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── MAP ── */
  #map {
    height: 28vh;
    flex-shrink: 0;
    cursor: crosshair;
    z-index: 1;
  }

  /* ── PROFILE PANEL ── */
  #panel {
    flex: 1;
    overflow-y: auto;
    background: var(--bg);
    border-top: 2px solid var(--border);
    padding-bottom: 40px;
  }

  #panel::-webkit-scrollbar { width: 6px; }
  #panel::-webkit-scrollbar-track { background: var(--surface); }
  #panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── IDLE ── */
  .idle {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 12px;
    color: var(--muted);
    padding: 40px;
    text-align: center;
  }

  .idle-icon {
    width: 56px;
    height: 56px;
    background: var(--green-lt);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
  }

  .idle h3 { font-size: 16px; color: var(--text); font-weight: 600; }
  .idle p { font-size: 14px; line-height: 1.6; max-width: 320px; }

  /* ── LOADING ── */
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 16px;
  }

  .spinner {
    width: 36px;
    height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--green);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading p { font-size: 14px; color: var(--muted); }

  /* ── PROFILE GRID ── */
  .profile {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 0;
  }

  /* ── SECTION ── */
  .section {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    border-right: 1px solid var(--border);
  }

  .section-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  /* ── PARCEL ── */
  .parcel-name {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 6px;
    line-height: 1.3;
  }

  .parcel-meta {
    font-size: 14px;
    color: var(--muted);
    line-height: 1.6;
  }

  .badge {
    display: inline-block;
    font-size: 12px;
    font-weight: 500;
    padding: 2px 10px;
    border-radius: 100px;
    margin-right: 6px;
    margin-top: 8px;
  }

  .badge-green { background: var(--green-lt); color: var(--green); }
  .badge-amber { background: var(--amber-lt); color: var(--amber); }
  .badge-gray  { background: var(--surface); color: var(--muted); border: 1px solid var(--border); }

  /* ── CONFIDENCE ── */
  .conf-score {
    font-size: 48px;
    font-weight: 700;
    color: var(--green);
    line-height: 1;
    margin-bottom: 4px;
  }

  .conf-score span { font-size: 20px; color: var(--muted); font-weight: 400; }

  .conf-level {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 12px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .conf-bar-wrap {
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    margin-bottom: 16px;
  }

  .conf-bar-fill {
    height: 100%;
    background: var(--green);
    border-radius: 3px;
    transition: width 0.8s ease;
  }

  .contrib-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .contrib-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
  }

  .contrib-name { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
  .contrib-pct  { font-size: 15px; font-weight: 600; color: var(--text); }
  .contrib-item.zero .contrib-pct { color: var(--muted); }

  /* ── SENSORS ── */
  .sensor-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .sensor-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    position: relative;
    border-top: 3px solid var(--green);
  }

  .sensor-card.stale      { border-top-color: var(--amber); }
  .sensor-card.unavailable { border-top-color: var(--border); }

  .sensor-name {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .sensor-value {
    font-size: 24px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
    margin-bottom: 4px;
    font-family: var(--mono);
  }

  .sensor-unit { font-size: 12px; color: var(--muted); line-height: 1.4; }
  .sensor-age  { font-size: 11px; color: var(--muted); margin-top: 8px; }

  /* ── AGREEMENT ── */
  .agreement-score {
    font-size: 36px;
    font-weight: 700;
    color: var(--green);
    margin-bottom: 4px;
    font-family: var(--mono);
  }

  .agreement-list { list-style: none; margin-top: 8px; }

  .agreement-list li {
    font-size: 13px;
    color: var(--text);
    padding: 6px 0 6px 20px;
    position: relative;
    line-height: 1.5;
    border-bottom: 1px solid var(--border);
  }

  .agreement-list li:last-child { border-bottom: none; }

  .agreement-list li::before {
    content: '✓';
    position: absolute;
    left: 0;
    color: var(--green);
    font-weight: 600;
  }

  .agreement-list li.flag::before { content: '!'; color: var(--amber); }
  .agreement-list li.flag { color: var(--amber); }

  /* ── AGRONOMIC ── */
  .agro-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

  .agro-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 10px;
    text-align: center;
  }

  .agro-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; font-weight: 600; }
  .agro-value { font-size: 15px; font-weight: 700; color: var(--text); }
  .agro-value.good     { color: var(--green); }
  .agro-value.moderate { color: var(--amber); }
  .agro-value.poor     { color: var(--red); }

  /* ── EXPLAINABILITY ── */
  .explain-item { margin-bottom: 16px; }

  .explain-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .explain-because { list-style: none; }

  .explain-because li {
    font-size: 13px;
    color: var(--muted);
    padding: 5px 0 5px 16px;
    position: relative;
    line-height: 1.5;
    border-bottom: 1px solid var(--border);
  }

  .explain-because li:last-child { border-bottom: none; }

  .explain-because li::before {
    content: '—';
    position: absolute;
    left: 0;
    color: var(--border);
  }

  /* ── FRESHNESS ── */
  .freshness-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

  .fresh-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .fresh-sensor { font-size: 12px; font-weight: 600; color: var(--text); }
  .fresh-age    { font-size: 12px; }
  .fresh-current { color: var(--green); }
  .fresh-recent  { color: #059669; }
  .fresh-stale   { color: var(--amber); }
  .fresh-no_data { color: var(--muted); }
  .fresh-seasonal_context { color: var(--muted); font-style: italic; }

  /* ── MAP MARKER ── */
  .pulse-marker {
    width: 16px; height: 16px;
    background: var(--green);
    border: 3px solid #fff;
    border-radius: 50%;
    box-shadow: 0 0 0 3px var(--green), 0 2px 8px rgba(22,163,74,0.4);
  }

  /* ── ERROR ── */
  .error-box {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--red-lt);
    border: 1px solid #fca5a5;
    border-radius: 10px;
    padding: 16px 20px;
    margin: 20px 24px;
    font-size: 14px;
    color: var(--red);
  }

  /* ── MOBILE ── */
  @media (max-width: 768px) {
    body { overflow: auto; height: auto; }
    #map { height: 25vh !important; }

    .topbar {
      padding: 10px 12px;
      gap: 8px;
      flex-wrap: wrap;
      height: auto;
    }

    .logo { font-size: 15px; }
    .tagline { display: none; }

    .coord-input {
      font-size: 14px;
      padding: 10px 12px;
      min-width: 0;
      flex: 1;
    }

    .btn-scan {
      font-size: 14px;
      padding: 10px 16px;
    }

    .main { flex-direction: column; height: auto; }

    #map { height: 35vh; }

    #panel {
      overflow: visible;
      padding-bottom: 60px;
    }

    .profile {
      grid-template-columns: 1fr;
    }

    .section {
      border-right: none;
      padding: 16px;
    }

    .conf-score { font-size: 40px; }

    .contrib-grid { grid-template-columns: 1fr 1fr; }

    .sensor-grid { grid-template-columns: 1fr 1fr; }

    .sensor-value { font-size: 20px; }

    .agro-grid { grid-template-columns: 1fr 1fr 1fr; }

    .freshness-grid { grid-template-columns: 1fr; }

    .agreement-list li { font-size: 13px; }

    .explain-because li { font-size: 13px; }

    .parcel-name { font-size: 16px; }
  }

  @media (max-width: 400px) {
    .sensor-grid { grid-template-columns: 1fr; }
    .contrib-grid { grid-template-columns: 1fr; }
    .agro-grid { grid-template-columns: 1fr; }
    .conf-score { font-size: 36px; }
  }

</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="logo">⬡ Cube<span> Earth</span></div>
  <input type="text" class="coord-input" id="coord-input" placeholder="53.7100, -6.2900 or click map"/>
  <button class="btn-scan" id="scan-btn" onclick="scanCoords()">Scan Field</button>
  <div class="tagline">Irish Field Intelligence · Live Satellite Data</div>
</div>

<!-- MAIN -->
<div class="main">
  <div id="map"></div>
  <div id="panel">
    <div class="idle">
      <div class="idle-icon">🛰</div>
      <h3>Click any field in Ireland</h3>
      <p>Or enter coordinates above and click Scan Field to get a live satellite intelligence report.</p>
    </div>
  </div>
</div>

<script>
const API_URL = 'https://cube-earth.onrender.com';

// ── MAP ──
const map = L.map('map', { zoomControl:false }).setView([53.5, -8.0], 7);

const satellite = L.tileLayer(
  'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
  { attribution:'Esri', maxZoom:19 }
);

const streets = L.tileLayer(
  'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
  { attribution:'© OpenStreetMap', maxZoom:19 }
);

satellite.addTo(map);
L.control.layers({'🛰 Satellite': satellite, '🗺 Streets': streets}, {}, {position:'topright'}).addTo(map);
L.control.zoom({ position:'bottomright' }).addTo(map);

let marker = null;

const icon = L.divIcon({
  className:'',
  html:'<div class="pulse-marker"></div>',
  iconSize:[16,16], iconAnchor:[8,8],
});

map.on('click', e => {
  const {lat, lng} = e.latlng;
  document.getElementById('coord-input').value = `${lat.toFixed(4)}, ${lng.toFixed(4)}`;
  placeMarker(lat, lng);
  scanField(lat, lng);
});

function placeMarker(lat, lng) {
  if (marker) marker.remove();
  marker = L.marker([lat,lng], {icon}).addTo(map);
}

function scanCoords() {
  const val = document.getElementById('coord-input').value.trim();
  const parts = val.split(',').map(s => parseFloat(s.trim()));
  if (parts.length===2 && !isNaN(parts[0]) && !isNaN(parts[1])) {
    placeMarker(parts[0], parts[1]);
    map.flyTo([parts[0], parts[1]], 14);
    scanField(parts[0], parts[1]);
  }
}

// ── SCAN ──
async function scanField(lat, lng) {
  showLoading();
  try {
    const res = await fetch(`${API_URL}/field_profile`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ lat, lng, year: new Date().getFullYear() }),
    });
    const data = await res.json();
    if (data.success) renderProfile(data);
    else showError(data.detail || 'API error');
  } catch(err) {
    showError('Error: ' + err.message + ' — ' + err.stack?.split('\n')[0]);
  }
}

function showLoading() {
  document.getElementById('scan-btn').disabled = true;
  document.getElementById('panel').innerHTML = `
    <div class="loading">
      <div class="spinner"></div>
      <p>Scanning field with live satellite data…</p>
    </div>`;
}

function scoreColor(label) {
  if (!label) return '';
  const l = label.toLowerCase();
  if (l.includes('excellent')||l.includes('good')||l.includes('suitable')) return 'good';
  if (l.includes('moderate')) return 'moderate';
  if (l.includes('poor')||l.includes('unsuitable')||l.includes('stress')) return 'poor';
  return '';
}

function renderProfile(d) {
  document.getElementById('scan-btn').disabled = false;
  const c=d.confidence, v=d.vegetation, sm=d.soil_moisture,
        s=d.sar, a=d.agreement, e=d.explainability,
        f=d.freshness, ag=d.agronomic, p=d.parcel, te=d.terrain;

  document.getElementById('panel').innerHTML = `
  <div class="profile">

    <!-- PARCEL -->
    <div class="section">
      <div class="section-label">Field / Parcel</div>
      <div class="parcel-name">${p ? p.crop||'Unknown crop' : 'No parcel matched'}</div>
      <div class="parcel-meta">
        ${p ? `${p.claim_area} ha &nbsp;·&nbsp; ${p.olr||''}` : ''}
        &nbsp;·&nbsp; ${te?.elevation_m ?? "?"}m elevation &nbsp;·&nbsp; ${te?.terrain ?? "unknown"}
      </div>
      <div>
        ${p?.grassland ? '<span class="badge badge-green">Grassland</span>' : ''}
        ${p?.tillage   ? '<span class="badge badge-amber">Tillage</span>'   : ''}
        ${p?.eco       ? '<span class="badge badge-green">ECO</span>'       : ''}
        ${p?.biss      ? '<span class="badge badge-gray">BISS</span>'       : ''}
      </div>
    </div>

    <!-- CONFIDENCE -->
    <div class="section">
      <div class="section-label">Confidence Score</div>
      <div class="conf-score">${c.score}<span>/10</span></div>
      <div class="conf-level">${c.level.replace('-',' ')}</div>
      <div class="conf-bar-wrap">
        <div class="conf-bar-fill" style="width:${c.score*10}%"></div>
      </div>
      <div class="contrib-grid">
        ${Object.entries(c.contributions).map(([k,v])=>`
          <div class="contrib-item ${v.percent===0?'zero':''}">
            <div class="contrib-name">${k}${v.age_days ? ` · ${v.age_days}d` : ''}</div>
            <div class="contrib-pct">${v.percent===0 ? 'unavailable' : v.percent.toFixed(1)+'%'}</div>
          </div>`).join('')}
      </div>
      ${(c.confidence_reducers||[]).length > 0 ? `
      <div style="margin:10px 0;padding:10px 12px;background:#fffbeb;border:1px solid #fde68a;border-radius:8px;font-size:12px;">
        <div style="font-weight:600;color:#92400e;margin-bottom:4px;">Reduced by:</div>
        ${(c.confidence_reducers||[]).map(r=>`<div style="color:#78350f;padding:2px 0">• ${r.factor} — ${r.impact}</div>`).join('')}
      </div>` : ''}
      ${(c.confidence_boosters||[]).length > 0 ? `
      <div style="margin:10px 0;padding:10px 12px;background:#f0fdf4;border:1px solid #86efac;border-radius:8px;font-size:12px;">
        <div style="font-weight:600;color:#166534;margin-bottom:4px;">Strengthened by:</div>
        ${(c.confidence_boosters||[]).map(b=>`<div style="color:#15803d;padding:2px 0">✓ ${b.factor} — ${b.impact}</div>`).join('')}
      </div>` : ''}
    </div>

    <!-- SENSORS -->
    <div class="section">
      <div class="section-label">Live Sensor Readings</div>
      <div class="sensor-grid">
        <div class="sensor-card ${f?.sentinel2?.freshness==='stale'?'stale':''}">
          <div class="sensor-name">Sentinel-2 Optical</div>
          <div class="sensor-value">${v.ndvi?.toFixed(3)||'—'}</div>
          <div class="sensor-unit">NDVI &nbsp;·&nbsp; ${v.ndvi_status||''}</div>
          <div class="sensor-age">${f?.sentinel2?.age_label||''}</div>
        </div>
        <div class="sensor-card ${sm.smap?.available?'':'unavailable'}">
          <div class="sensor-name">SMAP L4 Moisture</div>
          <div class="sensor-value">${sm.smap?.sm_surface_m3?.toFixed(3)||'—'}</div>
          <div class="sensor-unit">m³/m³ surface moisture</div>
          <div class="sensor-age">${f?.smap?.age_label||''}</div>
        </div>
        <div class="sensor-card ${s?.available?'':'unavailable'}">
          <div class="sensor-name">Sentinel-1 SAR</div>
          <div class="sensor-value">${s?.rvi?.toFixed(3)||'—'}</div>
          <div class="sensor-unit">RVI &nbsp;·&nbsp; ${s?.rvi_interpretation||'No data'}</div>
          <div class="sensor-age">${f?.sentinel1?.age_label||''} &nbsp;·&nbsp; ${s?.acquisitions||0} passes</div>
        </div>
        <div class="sensor-card">
          <div class="sensor-name">ERA5 Trend</div>
          <div class="sensor-value">${sm.era5?.surface_mean?.toFixed(3)||'—'}</div>
          <div class="sensor-unit">m³/m³ seasonal trend</div>
          <div class="sensor-age">Seasonal context</div>
        </div>
      </div>
    </div>

    <!-- FIELD DECISIONS -->
    <div class="section">
      <div class="section-label">Field Decisions Today</div>

      ${ag.crop_class === 'tillage' || ag.crop_class === 'arable' ? `
      <!-- TILLAGE DECISIONS -->
      <div class="agro-grid" style="grid-template-columns:1fr 1fr;">
        <div class="agro-card">
          <div class="agro-label">Crop Canopy</div>
          <div class="agro-value ${scoreColor(ag.tillage_intelligence?.crop_condition?.label)}">${ag.tillage_intelligence?.crop_condition?.label||'—'}</div>
          <div style="font-size:11px;color:var(--muted);margin-top:4px">NDVI ${ag.tillage_intelligence?.crop_condition?.ndvi||'—'}</div>
        </div>
        <div class="agro-card">
          <div class="agro-label">Soil Moisture</div>
          <div class="agro-value ${scoreColor(ag.tillage_intelligence?.moisture_condition?.label)}">${ag.tillage_intelligence?.moisture_condition?.label||'—'}</div>
          <div style="font-size:11px;color:var(--muted);margin-top:4px">${ag.tillage_intelligence?.moisture_condition?.surface_m3||'—'} m³/m³</div>
        </div>
      </div>
      <div style="margin-top:10px;padding:10px 12px;background:var(--surface);border:1px solid var(--border);border-radius:8px;font-size:12px;">
        <div style="font-weight:600;margin-bottom:4px;">Machinery:</div>
        <div style="color:var(--muted)">${ag.tillage_intelligence?.machinery_note||'—'}</div>
        ${ag.tillage_intelligence?.crop_condition?.age_note ? `
        <div style="margin-top:6px;color:var(--amber);font-size:11px;">⚠ ${ag.tillage_intelligence.crop_condition.age_note}</div>` : ''}
      </div>
      ` : `
      <!-- GRASSLAND DECISIONS -->
      <div class="agro-grid">
        <div class="agro-card">
          <div class="agro-label">Grazing</div>
          <div class="agro-value ${scoreColor(ag.grazing_suitability?.label)}">${ag.grazing_suitability?.label||'—'}</div>
          ${ag.grazing_suitability?.score !== undefined ? `<div style="font-size:11px;color:var(--muted);margin-top:4px">${ag.grazing_suitability.score}/${ag.grazing_suitability.max_score||8}</div>` : ''}
        </div>
        <div class="agro-card">
          <div class="agro-label">Machinery</div>
          <div class="agro-value ${scoreColor(ag.machinery_trafficability?.label)}">${ag.machinery_trafficability?.label||'—'}</div>
        </div>
        <div class="agro-card">
          <div class="agro-label">Slurry</div>
          <div class="agro-value ${scoreColor(ag.slurry_spreading?.suitable)}">${ag.slurry_spreading?.suitable||'—'}</div>
        </div>
      </div>
      ${ag.grazing_suitability?.breakdown ? `
      <div style="margin-top:12px;font-size:12px;">
        <div style="font-weight:600;color:var(--text);margin-bottom:6px;">Grazing score breakdown:</div>
        ${Object.entries(ag.grazing_suitability.breakdown).map(([k,v])=>`
          <div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border);">
            <span style="color:var(--muted)">${v.reason}</span>
            <span style="font-weight:600;color:${v.points>0?'var(--green)':v.points<0?'var(--red)':'var(--muted)'}">${v.points>0?'+':''}${v.points}</span>
          </div>`).join('')}
      </div>` : ''}
      `}
    </div>

    <!-- AGREEMENT -->
    <div class="section">
      <div class="section-label">Cross-sensor Agreement</div>
      <div class="agreement-score">${a.score}<span style="font-size:16px;color:var(--muted);font-family:var(--sans)">/10</span></div>
      <ul class="agreement-list">
        ${(a.agreements||[]).map(t=>`<li>${t}</li>`).join('')}
        ${(a.flags||[]).map(t=>`<li class="flag">${t}</li>`).join('')}
      </ul>
    </div>

    <!-- FRESHNESS -->
    <div class="section">
      <div class="section-label">Data Freshness</div>
      <div class="freshness-grid">
        ${Object.entries(f||{}).map(([k,v])=>`
          <div class="fresh-item">
            <span class="fresh-sensor">${v.sensor||k}</span>
            <span class="fresh-age fresh-${v.freshness||'no_data'}">${v.age_label||v.freshness||'—'}</span>
          </div>`).join('')}
      </div>
    </div>

    <!-- EXPLAINABILITY -->
    <div class="section" style="grid-column: 1 / -1">
      <div class="section-label">Why These Scores</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px">
        ${Object.entries(e||{}).filter(([k,v])=>v!==null).map(([k,v])=>`
          <div class="explain-item">
            <div class="explain-title">
              ${k.charAt(0).toUpperCase()+k.slice(1)}
              <span style="font-size:13px;font-weight:400;color:var(--muted)">→ ${v.label||''}</span>
            </div>
            <ul class="explain-because">
              ${(v.because||[]).map(b=>`<li>${b}</li>`).join('')}
            </ul>
          </div>`).join('')}
      </div>
    </div>

  </div>`;
}

function showError(msg) {
  document.getElementById('scan-btn').disabled = false;
  document.getElementById('panel').innerHTML = `
    <div class="error-box">
      <span style="font-size:20px">⚠</span>
      <span>${msg}</span>
    </div>`;
}
</script>
<script data-goatcounter="https://cube-earth.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
</body>
</html>
