<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cube Earth — Irish Field Intelligence</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#fff; --surface:#f8fafc; --border:#e2e8f0;
  --green:#16a34a; --green-lt:#dcfce7;
  --amber:#d97706; --amber-lt:#fef3c7;
  --red:#dc2626; --red-lt:#fee2e2;
  --blue:#1d4ed8; --blue-lt:#dbeafe;
  --text:#0f172a; --muted:#64748b;
  --mono:'JetBrains Mono',monospace;
  --sans:'Inter',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--sans);background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;}

/* TOPBAR */
.topbar{height:50px;background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0;z-index:1000;}
.logo{font-size:15px;font-weight:700;color:var(--green);white-space:nowrap;}
.logo span{color:var(--text);}
.coord-input{flex:1;max-width:240px;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:12px;padding:7px 11px;border-radius:8px;outline:none;}
.coord-input:focus{border-color:var(--green);}
.btn-scan{background:var(--green);color:#fff;border:none;font-size:13px;font-weight:600;padding:7px 16px;border-radius:8px;cursor:pointer;white-space:nowrap;}
.btn-scan:disabled{background:#86efac;cursor:not-allowed;}
.tagline{font-size:11px;color:var(--muted);margin-left:auto;white-space:nowrap;}

/* MAP */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
#map{height:32vh;flex-shrink:0;cursor:crosshair;}

/* TABS */
.tabs{display:flex;border-bottom:2px solid var(--border);background:var(--bg);flex-shrink:0;overflow-x:auto;position:sticky;top:0;z-index:100;}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:10px 18px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:all 0.15s;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--green);border-bottom-color:var(--green);}

/* PANEL */
#panel{flex:1;overflow-y:auto;background:var(--bg);}
#panel::-webkit-scrollbar{width:4px;}
#panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

/* TAB CONTENT */
.tab-content{display:none;padding:0 0 40px;}
.tab-content.active{display:block;}

/* SECTIONS */
.section{padding:16px 18px;border-bottom:1px solid var(--border);}
.section-label{font-size:10px;font-weight:700;letter-spacing:0.1em;color:var(--muted);text-transform:uppercase;margin-bottom:10px;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:0;}
.two-col .section{border-right:1px solid var(--border);}
.two-col .section:nth-child(even){border-right:none;}

/* IDLE */
.idle{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:200px;gap:12px;color:var(--muted);padding:40px;text-align:center;}
.idle h3{font-size:16px;color:var(--text);font-weight:600;}
.idle p{font-size:13px;line-height:1.6;max-width:280px;}

/* LOADING */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:200px;gap:16px;}
.spinner{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-steps{font-size:12px;color:var(--muted);text-align:center;line-height:2.2;}
.step{display:block;opacity:0.3;transition:opacity 0.3s;}
.step.active{opacity:1;color:var(--green);font-weight:500;}

/* PARCEL */
.parcel-badge{display:inline-flex;align-items:center;gap:5px;background:var(--green-lt);color:var(--green);font-size:10px;font-weight:700;padding:3px 10px;border-radius:100px;letter-spacing:0.05em;text-transform:uppercase;margin-bottom:7px;}
.parcel-name{font-size:18px;font-weight:700;margin-bottom:4px;line-height:1.3;}
.parcel-meta{font-size:13px;color:var(--muted);}
.badge{display:inline-block;font-size:10px;font-weight:500;padding:2px 8px;border-radius:100px;margin-right:4px;margin-top:5px;}
.badge-green{background:var(--green-lt);color:var(--green);}
.badge-amber{background:var(--amber-lt);color:var(--amber);}
.badge-gray{background:var(--surface);color:var(--muted);border:1px solid var(--border);}

/* CONFIDENCE */
.conf-hero{display:flex;align-items:flex-start;gap:14px;margin-bottom:10px;}
.conf-score{font-size:48px;font-weight:700;color:var(--green);line-height:1;}
.conf-score span{font-size:18px;color:var(--muted);font-weight:400;}
.conf-badges{display:flex;flex-direction:column;gap:5px;padding-top:6px;}
.conf-class{font-size:10px;font-weight:700;letter-spacing:0.08em;padding:3px 10px;border-radius:100px;text-transform:uppercase;display:inline-block;}
.conf-class.operational{background:var(--blue-lt);color:var(--blue);}
.conf-class.high-conf{background:var(--green-lt);color:var(--green);}
.conf-class.moderate{background:var(--amber-lt);color:var(--amber);}
.conf-class.limited{background:var(--red-lt);color:var(--red);}
.uncertainty-badge{font-size:10px;font-weight:600;padding:3px 10px;border-radius:100px;display:inline-block;}
.conf-bar-wrap{height:5px;background:var(--border);border-radius:3px;margin-bottom:12px;}
.conf-bar-fill{height:100%;background:var(--green);border-radius:3px;transition:width 0.8s ease;}

/* DECISIONS */
.decision-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.decision-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 10px;text-align:center;}
.decision-emoji{font-size:24px;margin-bottom:5px;}
.decision-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;font-weight:600;margin-bottom:5px;}
.decision-value{font-size:14px;font-weight:700;}
.decision-value.good{color:var(--green);}
.decision-value.moderate{color:var(--amber);}
.decision-value.poor{color:var(--red);}
.decision-sub{font-size:10px;color:var(--muted);margin-top:3px;}

/* SENSOR CARDS */
.sensor-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:8px;cursor:pointer;}
.sensor-header{display:flex;align-items:center;padding:12px 14px;gap:10px;}
.sensor-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.sensor-dot.fresh{background:var(--green);}
.sensor-dot.recent{background:#f59e0b;}
.sensor-dot.stale{background:var(--red);}
.sensor-dot.no-data{background:#cbd5e1;}
.sensor-info{flex:1;}
.sensor-name-row{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:2px;}
.sensor-val-row{display:flex;align-items:baseline;gap:6px;}
.sensor-value{font-size:22px;font-weight:700;font-family:var(--mono);}
.sensor-unit{font-size:11px;color:var(--muted);}
.sensor-age-row{font-size:10px;color:var(--muted);margin-top:2px;}
.sensor-age-bar{height:3px;background:var(--border);margin:0 14px 10px;}
.sensor-age-fill{height:100%;border-radius:1px;}
.sensor-expand{background:white;border-top:1px solid var(--border);padding:10px 14px;display:none;}
.sensor-expand.open{display:block;}
.sensor-expand-row{display:flex;justify-content:space-between;font-size:11px;padding:3px 0;border-bottom:1px solid var(--border);}
.sensor-expand-row:last-child{border:none;}
.sensor-chevron{font-size:12px;color:var(--muted);transition:transform 0.2s;}
.sensor-chevron.open{transform:rotate(180deg);}

/* AGREEMENT */
.agreement-score{font-size:34px;font-weight:700;color:var(--green);margin-bottom:8px;}
.agreement-list{list-style:none;}
.agreement-list li{font-size:12px;padding:5px 0 5px 18px;position:relative;border-bottom:1px solid var(--border);line-height:1.5;}
.agreement-list li:last-child{border:none;}
.agreement-list li::before{content:'✓';position:absolute;left:0;color:var(--green);font-weight:600;}
.agreement-list li.flag::before{content:'!';color:var(--amber);}
.agreement-list li.flag{color:var(--amber);}

/* CONFIDENCE MATH */
.contrib-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);}
.contrib-row:last-child{border:none;}
.contrib-name{flex:1;font-size:12px;color:var(--text);}
.contrib-bar-wrap{width:70px;height:4px;background:var(--border);border-radius:2px;}
.contrib-bar-fill{height:100%;border-radius:2px;}
.contrib-pct{font-size:12px;font-weight:600;width:34px;text-align:right;}

/* CONF PANELS */
.conf-panel{margin:8px 0;padding:10px 12px;border-radius:8px;font-size:12px;}
.conf-panel.reduced{background:#fffbeb;border:1px solid #fde68a;}
.conf-panel.boosted{background:#f0fdf4;border:1px solid #86efac;}
.conf-panel-title{font-weight:600;margin-bottom:4px;}
.conf-panel.reduced .conf-panel-title{color:#92400e;}
.conf-panel.boosted .conf-panel-title{color:#166534;}
.conf-panel-item{padding:2px 0;}
.conf-panel.reduced .conf-panel-item{color:#78350f;}
.conf-panel.boosted .conf-panel-item{color:#15803d;}

/* DATA RELIABILITY */
.reliability-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.reliability-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center;}
.reliability-label{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;margin-bottom:4px;}
.reliability-value{font-size:20px;font-weight:700;color:var(--green);}
.reliability-value.warn{color:var(--amber);}

/* BREAKDOWN */
.breakdown-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border);font-size:12px;}
.breakdown-row:last-child{border:none;}
.pts-pos{color:var(--green);font-weight:700;}
.pts-neg{color:var(--red);font-weight:700;}
.pts-zero{color:var(--muted);font-weight:700;}

/* TILLAGE */
.tillage-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.tillage-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px;}

/* ERROR */
.error-box{display:flex;align-items:center;gap:12px;background:var(--red-lt);border:1px solid #fca5a5;border-radius:10px;padding:14px 18px;margin:16px;font-size:13px;color:var(--red);}

/* MOISTURE TREND */
.trend-value{font-size:22px;font-weight:700;margin-bottom:4px;}
.trend-meta{font-size:11px;color:var(--muted);}

/* FRESHNESS LEGEND */
.fresh-legend{display:flex;gap:12px;font-size:11px;color:var(--muted);margin-bottom:10px;}

/* MOBILE */
@media(max-width:768px){
  body{overflow:auto;height:auto;padding-bottom:0;}
  #map{height:28vh !important;}
  #panel{overflow:visible;padding-bottom:60px;}
  .two-col{grid-template-columns:1fr;}
  .two-col .section{border-right:none;}
  .tagline{display:none;}
  .decision-grid{grid-template-columns:1fr 1fr 1fr;}
  .conf-score{font-size:40px;}
}
@media(max-width:400px){
  .decision-grid{grid-template-columns:1fr;}
  .tillage-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">⬡ Cube<span> Earth</span></div>
  <input type="text" class="coord-input" id="coord-input" placeholder="53.7100, -6.2900"/>
  <button class="btn-scan" id="scan-btn" onclick="scanCoords()">Scan Field</button>
  <div class="tagline">Irish Field Intelligence · Live Satellite Data</div>
</div>

<div class="main">
  <div id="map"></div>

  <div class="tabs" id="tabs" style="display:none">
    <div class="tab active" onclick="showTab('overview')">📋 Overview</div>
    <div class="tab" onclick="showTab('sensors')">🛰 Sensors</div>
    <div class="tab" onclick="showTab('confidence')">🧮 Confidence</div>
    <div class="tab" onclick="showTab('quality')">📊 Quality</div>
  </div>

  <div id="panel">
    <div class="idle">
      <div style="font-size:36px">🛰</div>
      <h3>Click any field in Ireland</h3>
      <p>Or enter coordinates above to get a live satellite field report.</p>
    </div>
  </div>
</div>

<script>
const API_URL = 'https://cube-earth.onrender.com';
let currentData = null;

// ── MAP ──
const map = L.map('map',{zoomControl:false}).setView([53.5,-8.0],7);
const satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{attribution:'Esri',maxZoom:19});
const streets = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:19});
satellite.addTo(map);
L.control.layers({'🛰 Satellite':satellite,'🗺 Streets':streets},{},{position:'topright'}).addTo(map);
L.control.zoom({position:'bottomright'}).addTo(map);

let marker=null; let parcelCircle=null; let matchLine=null;
const icon=L.divIcon({className:'',html:'<div style="width:14px;height:14px;background:#16a34a;border:3px solid #fff;border-radius:50%;box-shadow:0 0 0 3px #16a34a"></div>',iconSize:[14,14],iconAnchor:[7,7]});

map.on('click',e=>{
  const{lat,lng}=e.latlng;
  document.getElementById('coord-input').value=`${lat.toFixed(4)}, ${lng.toFixed(4)}`;
  placeMarker(lat,lng);
  scanField(lat,lng);
});

function placeMarker(lat,lng){
  if(marker)marker.remove();
  marker=L.marker([lat,lng],{icon}).addTo(map);
}
function highlightParcel(lat,lng,areaHa){
  if(parcelCircle)parcelCircle.remove();
  if(!lat||!lng)return;
  const r=Math.sqrt((areaHa||2)*10000/Math.PI);
  parcelCircle=L.circle([lat,lng],{
    radius:r,
    color:'#16a34a',
    weight:3,
    fill:true,
    fillColor:'#16a34a',
    fillOpacity:0.15,
  }).addTo(map);
}

function scanCoords(){
  const val=document.getElementById('coord-input').value.trim();
  const parts=val.trim().split(',').map(s=>parseFloat(s.trim()));
  if(parts.length===2&&!isNaN(parts[0])&&!isNaN(parts[1])){
    placeMarker(parts[0],parts[1]);
    map.flyTo([parts[0],parts[1]],14);
    scanField(parts[0],parts[1]);
  }
}

// ── TABS ──
function showTab(name){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  document.querySelector(`.tab[onclick="showTab('${name}')"]`).classList.add('active');
  document.getElementById(`tab-${name}`)?.classList.add('active');
}

// ── HELPERS ──
function freshnessClass(f){
  if(f==='current')return 'fresh';
  if(f==='recent'||f==='seasonal_context')return 'recent';
  if(f==='stale')return 'stale';
  return 'no-data';
}
function freshnessEmoji(f){
  if(f==='current')return '🟢';
  if(f==='recent'||f==='seasonal_context')return '🟡';
  if(f==='stale')return '🔴';
  return '⚪';
}
function confClass(score){
  if(score>=8.5)return{label:'High Confidence',css:'high-conf'};
  if(score>=7.0)return{label:'Operational',css:'operational'};
  if(score>=5.0)return{label:'Moderate',css:'moderate'};
  return{label:'Limited',css:'limited'};
}
function ndviStatusLabel(ndvi){
  if(ndvi===null||ndvi===undefined) return 'No data';
  if(ndvi<0.2)  return 'Bare soil or very sparse';
  if(ndvi<0.4)  return 'Sparse vegetation';
  if(ndvi<0.6)  return 'Moderate vegetation';
  if(ndvi<0.8)  return 'Strong vegetation';
  return 'Dense canopy';
}
function ndviStatusLabel(ndvi){
  if(ndvi===null||ndvi===undefined) return 'No data';
  if(ndvi<0.2)  return 'Bare soil or very sparse';
  if(ndvi<0.4)  return 'Sparse vegetation';
  if(ndvi<0.6)  return 'Moderate vegetation';
  if(ndvi<0.8)  return 'Strong vegetation';
  return 'Dense canopy';
}
function scoreColor(label){
  if(!label)return'';
  const l=label.toLowerCase();
  if(l.includes('excellent')||l.includes('good')||l.includes('suitable')||l.includes('high'))return'good';
  if(l.includes('moderate')||l.includes('adequate'))return'moderate';
  if(l.includes('poor')||l.includes('not suitable')||l.includes('stress'))return'poor';
  return'';
}
function ageBarWidth(days,maxDays){return Math.max(5,100-((days||0)/maxDays*100));}
function ageBarColor(freshness){
  if(freshness==='current')return'#16a34a';
  if(freshness==='recent')return'#f59e0b';
  return'#dc2626';
}
function toggleSensor(id){
  const el=document.getElementById(id);
  const ch=document.getElementById(id+'-ch');
  if(el){el.classList.toggle('open');ch?.classList.toggle('open');}
}

// ── SCAN ──
let stepInterval=null;
async function scanField(lat,lng){
  document.getElementById('scan-btn').disabled=true;
  document.getElementById('tabs').style.display='none';
  document.getElementById('panel').innerHTML=`
    <div class="loading">
      <div class="spinner"></div>
      <div class="loading-steps">
        <span class="step active">🛰 Fetching Sentinel-2...</span>
        <span class="step">💧 Computing soil moisture...</span>
        <span class="step">📡 Extracting SAR signal...</span>
        <span class="step">🧮 Calculating confidence...</span>
        <span class="step">🌱 Building field profile...</span>
      </div>
    </div>`;
  let step=0;
  if(stepInterval)clearInterval(stepInterval);
  stepInterval=setInterval(()=>{
    const steps=document.querySelectorAll('.loading-steps .step');
    steps.forEach(s=>s.classList.remove('active'));
    step=Math.min(step+1,steps.length-1);
    steps[step]?.classList.add('active');
  },2500);

  try{
    const res=await fetch(`${API_URL}/field_profile`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({lat,lng,year:new Date().getFullYear()}),
    });
    const data=await res.json();
    if(data.success)renderProfile(data);
    else showError(data.detail||'API error');
  }catch(err){
    showError('Error: ' + (err.message||err.toString()));
  }
}

// ── RENDER ──
function renderProfile(d){
  if(stepInterval)clearInterval(stepInterval);
  document.getElementById('scan-btn').disabled=false;
  currentData=d;

  const c=d.confidence,v=d.vegetation,sm=d.soil_moisture,
        s=d.sar,a=d.agreement,e=d.explainability,
        f=d.freshness,ag=d.agronomic,p=d.parcel,te=d.terrain;

  const cc=confClass(c.score);
  const cropIcon=ag.crop_class==='grassland'?'🌱':ag.crop_class==='tillage'?'🌾':ag.crop_class==='arable'?'🥕':'🌿';
  const uncertaintyCount=(c.uncertainty||[]).length;
  const uncLabel=uncertaintyCount===0?'Low':uncertaintyCount===1?'Moderate':'High';
  const uncColor=uncertaintyCount===0?{bg:'#f0fdf4',txt:'#166534'}:uncertaintyCount===1?{bg:'#fffbeb',txt:'#92400e'}:{bg:'#fee2e2',txt:'#991b1b'};

  // Moisture trend
  const smap_val=sm?.smap?.sm_surface_m3;
  const era5_val=sm?.era5?.surface_mean;
  let trendHtml='<div style="font-size:12px;color:var(--muted)">Insufficient data</div>';
  if(smap_val&&era5_val){
    const diff=smap_val-era5_val;
    const arrow=diff>0.05?'↑':diff<-0.05?'↓':'→';
    const label=diff>0.05?'Wetter than seasonal average':diff<-0.05?'Drier than seasonal average':'Near seasonal average';
    const col=diff>0.05?'#1d4ed8':diff<-0.05?'#d97706':'#16a34a';
    trendHtml=`<div class="trend-value" style="color:${col}">${arrow} ${label}</div>
    <div class="trend-meta">SMAP ${smap_val.toFixed(3)} vs ERA5 ${era5_val.toFixed(3)} m³/m³ (diff ${diff>=0?'+':''}${diff.toFixed(3)})</div>
    <div class="trend-meta" style="margin-top:3px">SMAP = current · ERA5 = seasonal baseline</div>`;
  }

  // Freshness score
  const fAges=[f?.sentinel2?.age_days,f?.smap?.age_days,f?.sentinel1?.age_days].filter(x=>x!=null);
  const fAvg=fAges.length?fAges.reduce((a,b)=>a+b,0)/fAges.length:30;
  const fScore=fAvg<3?'9.5':fAvg<7?'8.5':fAvg<14?'7.0':'5.5';

  // ── TAB: OVERVIEW ──
  const overviewHtml=`
  <div class="section">
    <div class="parcel-badge">${cropIcon} ${ag.crop_info?.label||'Field'}</div>
    <div class="parcel-name">${p?p.crop||'Unknown crop':'<span style="color:var(--amber)">⚠ No parcel in database</span>'}</div>


    <div class="parcel-meta">${p?`${p.claim_area} ha · ${p.olr||''}`:''} ${te?.elevation_m?`· ${te.elevation_m}m`:''} ${te?.terrain?`· ${te.terrain}`:''}</div>
    <div style="margin-top:6px">
      ${p?.grassland?'<span class="badge badge-green">Grassland</span>':''}
      ${p?.tillage?'<span class="badge badge-amber">Tillage</span>':''}
      ${p?.eco?'<span class="badge badge-green">ECO</span>':''}
      ${p?.biss?'<span class="badge badge-gray">BISS</span>':''}
    </div>
    ${(()=>{
      const dist=d?.parcel_context?.match_distance_m;
      const qual=d?.parcel_context?.match_quality;
      if(!dist)return'';

    <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
      <span class="section-label" style="margin:0">Cross-sensor Agreement</span>
      <span style="font-size:20px;font-weight:700;color:var(--green)">${a.score}/10</span>
    </div>
    <div style="display:flex;flex-direction:column;gap:3px">
      ${(a.agreements||[]).map(t=>`<div style="font-size:11px;padding:3px 0 3px 14px;position:relative;color:var(--text)"><span style="position:absolute;left:0;color:var(--green);font-weight:700">✓</span>${t.length>60?t.substring(0,60)+'…':t}</div>`).join('')}
      ${(a.flags||[]).map(t=>`<div style="font-size:11px;padding:3px 0 3px 14px;position:relative;color:var(--amber)"><span style="position:absolute;left:0;font-weight:700">!</span>${t.length>60?t.substring(0,60)+'…':t}</div>`).join('')}
    </div>
  </div>

  ${(c.confidence_reducers||[]).length>0?`
  <div class="section" style="padding:10px 18px">
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px">
      <span style="font-size:10px;font-weight:700;color:#92400e;background:#fffbeb;border:1px solid #fde68a;padding:3px 8px;border-radius:100px">Reduced:</span>
      ${(c.confidence_reducers||[]).map(r=>`<span style="font-size:10px;color:#78350f;background:#fffbeb;border:1px solid #fde68a;padding:3px 8px;border-radius:100px">${r.factor}${r.factor.includes('ECOSTRESS')?'  −0.3':''}</span>`).join('')}
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap">
      <span style="font-size:10px;font-weight:700;color:#166534;background:#f0fdf4;border:1px solid #86efac;padding:3px 8px;border-radius:100px">Strengthened:</span>
      ${(c.confidence_boosters||[]).map(b=>`<span style="font-size:10px;color:#15803d;background:#f0fdf4;border:1px solid #86efac;padding:3px 8px;border-radius:100px">✓ ${b.factor}</span>`).join('')}
    </div>
  </div>`:''}`;

  // ── TAB: QUALITY ──
  const qualityHtml=`
  <div class="section" style="padding:8px 18px">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:6px">
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:6px 10px;display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:10px;color:var(--muted);font-weight:600">Freshness</span>
        <span style="font-size:13px;font-weight:700;color:var(--green)">${fScore}/10</span>
      </div>
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:6px 10px;display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:10px;color:var(--muted);font-weight:600">Agreement</span>
        <span style="font-size:13px;font-weight:700;color:var(--green)">${a.score}/10</span>
      </div>
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:6px 10px;display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:10px;color:var(--muted);font-weight:600">Coverage</span>
        <span style="font-size:13px;font-weight:700;color:${d.thermal?.available?'var(--green)':'var(--amber)'}">${d.thermal?.available?'Full':'Partial'}</span>
      </div>
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:6px 10px;display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:10px;color:var(--muted);font-weight:600">Evidence</span>
        <span style="font-size:13px;font-weight:700;color:${a.score>=9?'var(--green)':'var(--amber)'}">${a.score>=9?'Strong':'Moderate'}</span>
      </div>
    </div>
    ${!d.thermal?.available?'<div style="font-size:10px;color:var(--amber);padding:5px 8px;background:var(--amber-lt);border-radius:5px">⚠ ECOSTRESS thermal unavailable</div>':''}
  </div>

  <div class="section">
    <div class="section-label">Data Freshness</div>
    <div class="fresh-legend"><span>🟢 &lt;3d</span><span>🟡 3–14d</span><span>🔴 &gt;14d</span><span>⚪ N/A</span></div>
    ${Object.entries(f||{}).map(([k,v])=>`
    <div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);font-size:11px">
      <span style="font-weight:600">${v.sensor?.split(' ')[0]||k}</span>
      <span>${freshnessEmoji(v.freshness)} <span style="color:var(--muted)">${v.age_label||'—'}</span></span>
    </div>`).join('')}
  </div>

  <div class="section">
    <div class="section-label">Moisture Trend</div>
    ${trendHtml}
  </div>

`;

  // ── BUILD PANEL ──
  document.getElementById('panel').innerHTML=`
    <div class="tab-content active" id="tab-overview">${overviewHtml}</div>
    <div class="tab-content" id="tab-sensors">${sensorsHtml}</div>
    <div class="tab-content" id="tab-confidence">${confidenceHtml}</div>
    <div class="tab-content" id="tab-quality">${qualityHtml}</div>`;

  document.getElementById('tabs').style.display='flex';
  if(p?.centroid_lat&&p?.centroid_lng){
    highlightParcel(p.centroid_lat, p.centroid_lng, p.claim_area);
    const dist=d?.parcel_context?.match_distance_m||0;
    if(matchLine)matchLine.remove();
    if(dist>100){
      matchLine=L.polyline(
        [[lat,lng],[p.centroid_lat,p.centroid_lng]],
        {color:'#16a34a',weight:2,dashArray:'5,5',opacity:0.7}
      ).addTo(map);
    }
  }
}

function showError(msg){
  if(stepInterval)clearInterval(stepInterval);
  document.getElementById('scan-btn').disabled=false;
  document.getElementById('tabs').style.display='none';
  document.getElementById('panel').innerHTML=`<div class="error-box"><span style="font-size:20px">⚠</span><span>${msg}</span></div>`;
}
</script>
<script data-goatcounter="https://cube-earth.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</body>
</html>
